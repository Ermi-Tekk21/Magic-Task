{% extends 'base.html' %}

{% block title %}
Create Account — Magic Task
{% endblock %}

{% block content %}

<div class="login-container">

    <span class="login-icon">✨</span>
    <h1>Create Account</h1>
    <p class="login-subtitle">Sign up to start organizing your life</p>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Sign Up
        </button>

    </form>

    <div style="margin-top: 24px; text-align: center;">
        <span style="color: var(--text-secondary); font-size: 0.875rem;">Already have an account? </span>
        <a href="{% url 'login' %}" style="color: var(--accent-hover); font-size: 0.875rem; text-decoration: none; font-weight: 600; transition: color var(--transition-fast);" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--accent-hover)'">Sign In</a>
    </div>

</div>

{% endblock %}
