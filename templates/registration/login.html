{% extends 'base.html' %}

{% block title %}
Sign In — Magic Task
{% endblock %}

{% block content %}

<div class="login-container">

    <span class="login-icon">🔐</span>
    <h1>Welcome Back</h1>
    <p class="login-subtitle">Sign in to access your tasks</p>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Sign In
        </button>

    </form>

    <div style="margin-top: 24px; text-align: center;">
        <span style="color: var(--text-secondary); font-size: 0.875rem;">Don't have an account? </span>
        <a href="{% url 'signup' %}" style="color: var(--accent-hover); font-size: 0.875rem; text-decoration: none; font-weight: 600; transition: color var(--transition-fast);" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--accent-hover)'">Sign Up</a>
    </div>

</div>

{% endblock %}
