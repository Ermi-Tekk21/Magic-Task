{% extends 'base.html' %}

{% block title %}
Sign In — Magic Task
{% endblock %}

{% block content %}

<div class="login-container">

    <span class="login-icon">🔐</span>
    <h1>Welcome Back</h1>
    <p class="login-subtitle">Sign in to access your tasks</p>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Sign In
        </button>

    </form>

</div>

{% endblock %}
