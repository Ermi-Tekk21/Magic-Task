<!DOCTYPE html>
<html>
<head>
    <title>Page Not Found</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .card{
            text-align:center;
            background:white;
            padding:40px;
            border-radius:12px;
            box-shadow:0 4px 20px rgba(0,0,0,0.1);
        }

        h1{
            font-size:72px;
            color:#e74c3c;
        }

        p{
            margin:20px 0;
            color:#555;
        }

        a{
            text-decoration:none;
            background:#3498db;
            color:white;
            padding:10px 20px;
            border-radius:8px;
        }
    </style>

</head>

<body>

<div class="card">

    <h1>404</h1>

    <p>The page you are looking for does not exist.</p>

    <a href="/">Go Home</a>

</div>

</body>
</html>
