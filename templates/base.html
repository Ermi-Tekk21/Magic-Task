{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Magic Task — A beautiful, modern todo application to organize your life.">

    <title>
        {% block title %}Magic Task{% endblock %}
    </title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

    <nav>
        <div class="nav-left">
            <a href="/" class="nav-brand">
                <span class="brand-icon">✦</span>
                Magic Task
            </a>
        </div>

        <div class="nav-right">
            {% if user.is_authenticated %}

            <span class="nav-user">
                Hello, <span class="username">{{ user.username }}</span>
            </span>

            <a href="{% url 'logout' %}" class="nav-logout-btn">
                Logout
            </a>

            {% else %}

            <a href="{% url 'login' %}">
                Sign In
            </a>

            <a href="{% url 'signup' %}" class="nav-login-btn">
                Sign Up
            </a>

            {% endif %}
        </div>
    </nav>

    <div class="page-container">

        {% block content %}
        {% endblock %}

    </div>

    <footer>
        Made with <span class="footer-heart">♥</span> using Django
    </footer>

</body>

</html>
