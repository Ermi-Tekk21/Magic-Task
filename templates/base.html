<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
        {% endblock %}
    </title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f9;
            color: #333;
        }

        nav {
            background: #2c3e50;
            padding: 15px 30px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }

        nav a:hover {
            opacity: 0.8;
        }

        .page-container {
            padding: 20px;
        }

        footer {
            text-align: center;
            color: #777;
            margin-top: 40px;
            padding: 20px;
        }

    </style>

    {% block extra_css %}
    {% endblock %}

</head>

<body>

    <nav>
        <a href="/">🏠 Home</a>
        <a href="/about/">! About</a>
    </nav>

    <div class="page-container">

        {% block content %}
        {% endblock %}

    </div>

    <footer style="background-color: #e0e0e0;">
        Django Todo App • Learning Project
    </footer>

</body>

</html>
